# JUL (java.util.logging) configuration for the test suite
# Loaded at runtime by the static initializer in SetUp.java

# Output format: message text only — no timestamps, class names, or log levels.
# %5$s = the log message; %n = platform line separator.
java.util.logging.SimpleFormatter.format=%5$s%n

# Default level for all loggers not explicitly overridden below.
.level=INFO

# Route all log output to the console (stdout).
handlers=java.util.logging.ConsoleHandler
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Noise suppression
# Silence verbose internal logging from Selenium, Chrome DevTools Protocol,
# and Selenide so only test-level output appears in the console.
org.openqa.selenium.level=OFF
org.openqa.selenium.devtools.level=OFF
com.codeborne.selenide.level=OFF
